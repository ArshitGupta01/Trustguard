<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            width: 360px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 36px;
            margin-bottom: 5px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 14px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: .3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #00ff88;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: all 0.2s;
            font-size: 14px;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.3);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        #analysisStatus {
            text-align: center;
            margin: 10px 0;
            font-size: 13px;
            min-height: 20px;
            font-weight: 500;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 11px;
            opacity: 0.5;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            margin-top: 8px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">🛡️</div>
        <h1>TrustGuard</h1>
        <div class="connection-status">
            <span class="status-dot"></span>
            <span>Ready to analyze</span>
        </div>
    </div>

    <div class="status">
        <div class="toggle-container">
            <span>Enable Analysis</span>
            <label class="switch">
                <input type="checkbox" id="enableToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="toggle-container">
            <span>Show on Page</span>
            <label class="switch">
                <input type="checkbox" id="showToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-value" id="analyzedCount">0</div>
            <div class="stat-label">Products Analyzed</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="flaggedCount">0</div>
            <div class="stat-label">Flags Raised</div>
        </div>
    </div>

    <button class="action-btn" id="analyzeBtn">🔍 Analyze This Page</button>
    <div id="analysisStatus"></div>
    <div id="qwenSummary" style="margin-top: 10px; font-size: 12px; line-height: 1.4; color: #cfffcf;"></div>

    <div class="footer">
        v1.1.0 • Privacy-First • Local Processing
    </div>

    <script src="popup.js"></script>
</body>

</html>
