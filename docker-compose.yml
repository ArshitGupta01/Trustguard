version: '3.9'
services:
  mongodb:
    image: mongo:7.0
    container_name: trustguard-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - D:\Finaltry\mongodb:/data/db

  ollama:
    image: ollama/ollama:latest
    container_name: trustguard-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_MODEL=qwen2.5:latest
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - D:\Finaltry\ollama:/root/.ollama
# No command needed as entrypoint handles it

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trustguard-backend
    restart: unless-stopped
    ports:
      - "8008:8000"
    environment:
      - ENABLE_ML=1
      - MODEL_TRAIN_THRESHOLD=30
      - MONGODB_URI=mongodb://mongodb:27017/trustguard
      - MONGODB_DB=trustguard
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:latest
      - LOG_LEVEL=INFO
    depends_on:
      - mongodb
      - ollama
    volumes:
      - ./backend:/app

volumes:
  mongo_data:
